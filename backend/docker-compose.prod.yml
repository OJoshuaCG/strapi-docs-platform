# Production overrides for docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# What this file changes vs docker-compose.yml:
#   - Strapi uses the 'production' Dockerfile stage (pre-compiled, no dev server)
#   - No bind mounts — the built image is the source of truth
#   - NODE_ENV=production
#   - MEILI_ENV=production
#   - Shorter start_period for healthcheck (admin panel is pre-built)

services:
  strapi:
    build:
      context: ./cms
      target: production       # overrides: development → production
    volumes:
      # Remove the development bind mounts.
      # Uploads go to Wasabi in production; no local upload volume needed.
      - type: volume
        source: cms_uploads
        target: /app/public/uploads
    environment:
      NODE_ENV: production
    healthcheck:
      start_period: 60s        # faster than dev (no TypeScript compilation on start)

  meilisearch:
    environment:
      MEILI_ENV: production

volumes:
  cms_uploads:
