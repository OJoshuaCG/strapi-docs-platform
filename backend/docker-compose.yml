services:

  # ─── Strapi CMS ─────────────────────────────────────────────────────────────
  strapi:
    build:
      context: ./cms
      target: development
    restart: unless-stopped
    volumes:
      # Only mount source code needed for runtime (src/, config/, package.json).
      # We deliberately DO NOT mount the full ./cms:/app because the pre-built
      # admin panel in the image must be preserved. Mounting selectively prevents
      # the build artifacts from being overwritten while still allowing code
      # changes in src/ and config/ to be picked up.
      - ./cms/src:/app/src
      - ./cms/config:/app/config
      - ./cms/public:/app/public
      - ./cms/package.json:/app/package.json
      - ./cms/package-lock.json:/app/package-lock.json
      - cms_node_modules:/app/node_modules
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      # ── Disable admin panel watcher to avoid WebSocket HMR issues ──
      # The admin is pre-built in the image. This prevents Strapi from
      # trying to rebuild it on the fly (which causes WS connection errors).
      STRAPI_ADMIN_WATCHER_DISABLE: "true"
      # ── Database ──
      DATABASE_CLIENT: ${DATABASE_CLIENT:-mysql}
      DATABASE_HOST: ${DATABASE_HOST:-host.docker.internal}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: "false"
      # ── Strapi secrets ──
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # ── CORS ──
      FRONTEND_URL: ${FRONTEND_URL}
      # ── Wasabi (S3-compatible storage) ──
      WASABI_ACCESS_KEY: ${WASABI_ACCESS_KEY}
      WASABI_SECRET_KEY: ${WASABI_SECRET_KEY}
      WASABI_BUCKET: ${WASABI_BUCKET}
      WASABI_REGION: ${WASABI_REGION:-us-east-1}
      WASABI_ENDPOINT: ${WASABI_ENDPOINT:-https://s3.wasabisys.com}
      WASABI_UPLOAD_PREFIX: ${WASABI_UPLOAD_PREFIX:-cms}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - doc-network

  # ─── Meilisearch ────────────────────────────────────────────────────────────
  # Started now; plugin integration is Phase 2.
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - doc-network

  # ─── Frontend (SvelteKit) ───────────────────────────────────────────────────
  # The VITE_STRAPI_URL build arg is baked into the JS bundle.
  # For Docker: set it to the URL reachable from both the container AND the
  # browser. In dev that is http://localhost:1337 (Strapi exposed on host).
  # In production, use the public Strapi URL (e.g. https://api.example.com).
  frontend:
    build:
      context: ../frontend
      args:
        VITE_STRAPI_URL: ${VITE_STRAPI_URL:-http://localhost:1337}
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${FRONTEND_URL:-http://localhost:5173}
      # Internal Docker network URL for SSR → Strapi requests.
      # The browser still uses VITE_STRAPI_URL (baked at build time).
      STRAPI_INTERNAL_URL: http://strapi:1337
    depends_on:
      strapi:
        condition: service_healthy
    networks:
      - doc-network

  # ─── Phase 2 placeholder ────────────────────────────────────────────────────
  # Uncomment when the Python RAG agent API is ready.
  #
  # python-api:
  #   build: ./python-api
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     MEILISEARCH_HOST: http://meilisearch:7700
  #     MEILISEARCH_API_KEY: ${MEILISEARCH_MASTER_KEY}
  #   networks:
  #     - doc-network
  #   depends_on:
  #     - meilisearch

networks:
  doc-network:
    driver: bridge

volumes:
  meilisearch_data:
  cms_node_modules:
