services:

  # ─── MariaDB ────────────────────────────────────────────────────────────────
  # Internal only — no host port exposed intentionally.
  mariadb:
    image: mariadb:10.11
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_USER: ${DATABASE_USERNAME}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - doc-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Strapi CMS ─────────────────────────────────────────────────────────────
  strapi:
    build:
      context: ./cms
      target: development
    restart: unless-stopped
    volumes:
      # Bind-mount source for hot reload. node_modules live in a named volume
      # so Linux binaries (built inside the image) are never overwritten by
      # any Windows-compiled modules on the host.
      - ./cms:/app
      - cms_node_modules:/app/node_modules
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      # ── Database ──
      DATABASE_CLIENT: mysql2
      DATABASE_HOST: mariadb
      DATABASE_PORT: 3306
      DATABASE_NAME: ${DATABASE_NAME}
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_SSL: "false"
      # ── Strapi secrets ──
      APP_KEYS: ${APP_KEYS}
      API_TOKEN_SALT: ${API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${TRANSFER_TOKEN_SALT}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # ── CORS ──
      FRONTEND_URL: ${FRONTEND_URL}
      # ── Wasabi (S3-compatible storage) ──
      WASABI_ACCESS_KEY: ${WASABI_ACCESS_KEY}
      WASABI_SECRET_KEY: ${WASABI_SECRET_KEY}
      WASABI_BUCKET: ${WASABI_BUCKET}
      WASABI_REGION: ${WASABI_REGION:-us-east-1}
      WASABI_ENDPOINT: ${WASABI_ENDPOINT:-https://s3.wasabisys.com}
      WASABI_UPLOAD_PREFIX: ${WASABI_UPLOAD_PREFIX:-cms}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/_health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - doc-network

  # ─── Meilisearch ────────────────────────────────────────────────────────────
  # Started now; plugin integration is Phase 2.
  meilisearch:
    image: getmeili/meilisearch:v1.12
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: ${MEILI_ENV:-development}
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - doc-network

  # ─── Frontend (SvelteKit) ───────────────────────────────────────────────────
  # The VITE_STRAPI_URL build arg is baked into the JS bundle.
  # For Docker: set it to the URL reachable from both the container AND the
  # browser. In dev that is http://localhost:1337 (Strapi exposed on host).
  # In production, use the public Strapi URL (e.g. https://api.example.com).
  frontend:
    build:
      context: ../frontend
      args:
        VITE_STRAPI_URL: ${VITE_STRAPI_URL:-http://localhost:1337}
    restart: unless-stopped
    ports:
      - "5173:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      ORIGIN: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      strapi:
        condition: service_healthy
    networks:
      - doc-network

  # ─── Phase 2 placeholder ────────────────────────────────────────────────────
  # Uncomment when the Python RAG agent API is ready.
  #
  # python-api:
  #   build: ./python-api
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     MEILISEARCH_HOST: http://meilisearch:7700
  #     MEILISEARCH_API_KEY: ${MEILISEARCH_MASTER_KEY}
  #   networks:
  #     - doc-network
  #   depends_on:
  #     - meilisearch

networks:
  doc-network:
    driver: bridge

volumes:
  mariadb_data:
  meilisearch_data:
  cms_node_modules:
